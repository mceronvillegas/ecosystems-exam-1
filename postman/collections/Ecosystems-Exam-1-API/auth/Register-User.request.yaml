$kind: http-request
name: Register User
method: POST
url: '{{baseUrl}}/api/auth/register'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "johndoe",
      "email": "john@example.com",
      "password": "password123",
      "role": "consumer"
    }
