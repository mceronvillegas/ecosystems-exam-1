$kind: http-request
name: Update Order Status
method: PATCH
url: '{{baseUrl}}/api/orders/:id'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
pathVariables:
  - key: id
    value: '1'
body:
  type: json
  content: |-
    {
      "status": "accepted",
      "deliveryId": "optional-delivery-user-id"
    }
