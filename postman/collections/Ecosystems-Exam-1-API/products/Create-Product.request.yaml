$kind: http-request
name: Create Product
method: POST
url: '{{baseUrl}}/api/products'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Burger",
      "price": 9.99,
      "storeId": 1
    }
