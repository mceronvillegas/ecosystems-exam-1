$kind: http-request
name: Update Product
method: PATCH
url: '{{baseUrl}}/api/products/:id'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
pathVariables:
  - key: id
    value: '1'
body:
  type: json
  content: |-
    {
      "price": 12.99
    }
